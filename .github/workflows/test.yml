name: Test

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  # ──────────────────────────────────────────────
  # Step 1: Build Rust core for all platforms
  # ──────────────────────────────────────────────
  build-rust:
    name: Rust Core (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            os: ubuntu-latest
            rust_target: x86_64-unknown-linux-musl
            binary: slipstream-client-linux-amd64
            use_cross: true
          - name: linux-arm64
            os: ubuntu-latest
            rust_target: aarch64-unknown-linux-musl
            binary: slipstream-client-linux-arm64
            use_cross: true
          - name: windows-amd64
            os: ubuntu-latest
            rust_target: x86_64-pc-windows-gnu
            binary: slipstream-client.exe
            use_cross: true
          - name: darwin-amd64
            os: macos-13
            rust_target: x86_64-apple-darwin
            binary: slipstream-client-darwin-amd64
            use_cross: false
          - name: darwin-arm64
            os: macos-14
            rust_target: aarch64-apple-darwin
            binary: slipstream-client-darwin-arm64
            use_cross: false
          - name: freebsd-amd64
            os: ubuntu-latest
            rust_target: x86_64-unknown-freebsd
            binary: slipstream-client-freebsd-amd64
            use_cross: true
          - name: openbsd-amd64
            os: ubuntu-latest
            rust_target: x86_64-unknown-openbsd
            binary: slipstream-client-openbsd-amd64
            use_cross: true

    steps:
      - name: Clone slipstream-rust
        run: git clone --depth 1 --recurse-submodules https://github.com/Mygod/slipstream-rust.git

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install build deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update -qq && sudo apt-get install -y cmake

      - name: Install build deps (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Configure cross for musl
        if: matrix.use_cross
        working-directory: slipstream-rust
        run: |
          cat > Cross.toml << 'EOF'
          [build.env]
          passthrough = ["CFLAGS", "CXXFLAGS", "CMAKE_C_FLAGS"]
          EOF

      - name: Build with cross
        if: matrix.use_cross
        working-directory: slipstream-rust
        env:
          CFLAGS: "-U_FORTIFY_SOURCE -D_FORTIFY_SOURCE=0"
          CXXFLAGS: "-U_FORTIFY_SOURCE -D_FORTIFY_SOURCE=0"
          CMAKE_C_FLAGS: "-U_FORTIFY_SOURCE -D_FORTIFY_SOURCE=0"
        run: cross build --release --target ${{ matrix.rust_target }} -p slipstream-client --features openssl-vendored,picoquic-minimal-build

      - name: Build with cargo (native)
        if: "!matrix.use_cross"
        working-directory: slipstream-rust
        run: cargo build --release --target ${{ matrix.rust_target }} -p slipstream-client --features openssl-vendored,picoquic-minimal-build

      - name: Prepare artifact
        run: |
          SRC=$(find slipstream-rust/target/${{ matrix.rust_target }}/release/ -maxdepth 1 \( -name "slipstream-client" -o -name "slipstream-client.exe" \) -type f | head -1)
          cp "$SRC" "${{ matrix.binary }}"
          chmod +x "${{ matrix.binary }}" 2>/dev/null || true

      - name: Upload Rust binary
        uses: actions/upload-artifact@v4
        with:
          name: rust-${{ matrix.name }}
          path: ${{ matrix.binary }}
          retention-days: 1

  # ──────────────────────────────────────────────
  # Step 2: Test Go builds for all platforms
  # ──────────────────────────────────────────────
  test-go:
    name: Test Go (${{ matrix.name }})
    runs-on: ubuntu-latest
    needs: build-rust
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            goos: linux
            goarch: amd64
            rust_artifact: rust-linux-amd64
          - name: linux-arm64
            goos: linux
            goarch: arm64
            rust_artifact: rust-linux-arm64
          - name: windows-amd64
            goos: windows
            goarch: amd64
            rust_artifact: rust-windows-amd64
          - name: darwin-amd64
            goos: darwin
            goarch: amd64
            rust_artifact: rust-darwin-amd64
          - name: darwin-arm64
            goos: darwin
            goarch: arm64
            rust_artifact: rust-darwin-arm64
          - name: freebsd-amd64
            goos: freebsd
            goarch: amd64
            rust_artifact: rust-freebsd-amd64
          - name: openbsd-amd64
            goos: openbsd
            goarch: amd64
            rust_artifact: rust-openbsd-amd64

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          check-latest: true

      - name: Verify formatting
        run: test -z "$(gofmt -l ./...)"

      - name: Build without embed
        run: CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -v ./cmd/slipstreamplus

      - name: Download Rust binary
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.rust_artifact }}
          path: slipstreamorg/

      - name: Build with embed
        run: |
          ls -la slipstreamorg/
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -tags embed_slipstream -v ./cmd/slipstreamplus
